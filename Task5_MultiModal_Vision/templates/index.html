<!DOCTYPE html>
<html>
<head>
    <title>AI Vision Analyzer</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            width:450px;
            border-radius:15px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#1e3c72;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:25px;
        }

        input[type=file]{
            border:2px dashed #1e3c72;
            padding:20px;
            width:90%;
            border-radius:10px;
            cursor:pointer;
            margin-bottom:20px;
        }

        button{
            background:#1e3c72;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16305c;
        }

        .footer{
            margin-top:20px;
            color:#777;
            font-size:13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 AI Vision Analyzer</h1>

    <p>
        Upload an image of handwritten notes or broken appliances
        and let AI analyze it.
    </p>

    <form action="/analyze" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br>
        <button type="submit">Analyze Image</button>
    </form>

    <div class="footer">
        Powered by Gemini Vision AI
    </div>
</div>

</body>
</html>
